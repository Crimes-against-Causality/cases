name: Trigger site rebuild

# Notify the website repository to rebuild and redeploy whenever the case
# content changes. Requires a repository secret SITE_DISPATCH_TOKEN: a token
# with "Contents: write" access to crimes-against-causality.github.io.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Signal the site repository
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          gh api -X POST \
            repos/crimes-against-causality/crimes-against-causality.github.io/dispatches \
            -f event_type=cases-updated
